<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Name a Color</title>
<meta name="description" content="Enter a hex code and get a color name.">
<meta name="theme-color" content="#0c0c0e">

<link rel="icon" href="/favicon.ico" sizes="any">

<meta property="og:type" content="website">

<meta name="twitter:card" content="summary">

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#2a2a2e;
  --accent:rgba(255,255,255,0.30);
  --ink:rgba(255,255,255,0.94);
  --ease:cubic-bezier(.22,1,.36,1);
}

html{
  height:100%;
  overflow-x:hidden;
  -webkit-text-size-adjust:100%;
  text-size-adjust:100%;
}

body{
  min-height:100vh;
  min-height:100svh;
  width:100%;
  max-width:100%;
  background:#0c0c0e;
  color:var(--ink);
  font-family:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;
  display:flex;
  flex-direction:column;
  position:relative;
  overflow-x:clip;
  -webkit-tap-highlight-color:transparent;
}

/* text selection colour */
::selection{
  background:var(--accent);
  color:#0c0c0e;
}

/* buttons: no gesture-disambiguation delay on touch */
button{
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}

/* instant press feedback (no transition on the way down) */
.copy:active,
.clear:active,
.segs button:active{
  transition:none;
  transform:scale(.94);
}
.copy:active{background:rgba(255,255,255,.75)}
.clear:active{background:rgba(255,255,255,.22)}

/* stop long-press selecting decorative / interactive chrome */
.topbar,
.family,
.name,
.hash,
.grouplabel,
.hint,
.segs,
.copy,
.clear,
.footer{
  -webkit-user-select:none;
  user-select:none;
}

/* ambient glow */
.glow{
  position:absolute;
  top:-25%;
  left:50%;
  width:min(960px, 140vw);
  aspect-ratio:1;
  border-radius:50%;
  background:var(--bg);
  filter:blur(200px);
  opacity:.24;
  transition:background 900ms var(--ease), opacity 900ms var(--ease);
  animation:glowdrift 14s ease-in-out infinite;
  will-change:transform;
  pointer-events:none;
}
@keyframes glowdrift{
  0%{transform:translate(-50%,0) scale(1)}
  50%{transform:translate(-50%,2%) scale(1.06)}
  100%{transform:translate(-50%,0) scale(1)}
}
@media (prefers-reduced-motion:reduce){
  .glow{animation:none}
  *{transition-duration:.01ms !important}
}

/* top bar */
.topbar{
  position:relative;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:32px 40px;
  font-family:'Geist Mono',ui-monospace,monospace;
  font-size:12px;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:rgba(255,255,255,.5);
}

/* center stage */
.stage{
  position:relative;
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:0 24px 24px;
}

.swatch{
  width:92px;
  height:92px;
  border-radius:22px;
  background:var(--bg);
  box-shadow:0 24px 60px -18px var(--bg), inset 0 0 0 1px rgba(255,255,255,.08);
  transition:background 900ms var(--ease), box-shadow 900ms var(--ease);
  margin-bottom:30px;
}

.family{
  font-family:'Geist Mono',ui-monospace,monospace;
  font-size:12px;
  letter-spacing:.28em;
  text-transform:uppercase;
  color:rgba(255,255,255,.42);
  margin-bottom:18px;
}

.name{
  font-family:'Instrument Serif',Georgia,serif;
  font-weight:400;
  font-size:clamp(34px,9vw,140px);
  line-height:.98;
  letter-spacing:-.01em;
  text-wrap:balance;
  color:var(--accent);
  transition:color 700ms var(--ease);
  max-width:100%;
  overflow-wrap:break-word;
  hyphens:auto;
}

/* hex input */
.hexwrap{
  margin-top:44px;
  display:inline-flex;
  align-items:center;
  gap:4px;
  border-bottom:1.5px solid rgba(255,255,255,.16);
  padding:6px 4px 10px;
  transition:border-color 300ms;
}
.hexwrap:focus-within{border-bottom-color:rgba(255,255,255,.4)}

.hash{
  font-family:'Geist Mono',ui-monospace,monospace;
  font-size:clamp(22px,3.4vw,34px);
  color:rgba(255,255,255,.38);
}

.hexfield{
  display:inline-block;
  min-width:clamp(180px,32vw,300px);
  outline:none;
  color:var(--ink);
  font-family:'Geist Mono',ui-monospace,monospace;
  font-size:clamp(22px,3.4vw,34px);
  letter-spacing:.06em;
  caret-color:var(--accent);
  white-space:pre;
  overflow:hidden;
  -webkit-user-modify:read-write-plaintext-only;
  -webkit-touch-callout:none;
}
.hexfield:empty::before{
  content:attr(data-placeholder);
  color:rgba(255,255,255,.28);
  pointer-events:none;
}

.clear{
  flex:none;
  display:grid;
  place-items:center;
  width:26px;
  height:26px;
  margin-left:2px;
  padding:0;
  border:none;
  border-radius:50%;
  background:rgba(255,255,255,.08);
  color:rgba(255,255,255,.55);
  cursor:pointer;
  transition:background 180ms, color 180ms, opacity 180ms, transform 140ms var(--ease);
}
.clear svg{width:13px;height:13px}
.clear:hover{background:rgba(255,255,255,.16);color:rgba(255,255,255,.9)}
.is-empty .clear{opacity:0;pointer-events:none}

/* meta + copy */
.meta{
  margin-top:36px;
  display:flex;
  align-items:center;
  gap:14px;
  flex-wrap:wrap;
  justify-content:center;
}
.pills{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
  font-family:'Geist Mono',ui-monospace,monospace;
  font-size:12px;
  letter-spacing:.04em;
  color:rgba(255,255,255,.6);
}
.pill{
  border:1px solid rgba(255,255,255,.14);
  border-radius:999px;
  padding:8px 14px;
  white-space:nowrap;
}

.copy{
  cursor:pointer;
  font-family:'Geist Mono',ui-monospace,monospace;
  font-size:12px;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:#0c0c0e;
  background:rgba(255,255,255,.94);
  border:none;
  border-radius:999px;
  padding:11px 20px;
  transition:opacity 200ms, transform 140ms var(--ease), background 140ms;
}
.copy:hover{opacity:.85}

/* settings */
.settings{
  margin-top:40px;
  display:flex;
  gap:36px;
  flex-wrap:wrap;
  justify-content:center;
  align-items:flex-start;
}
.group{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}
.grouplabel{
  font-family:'Geist Mono',ui-monospace,monospace;
  font-size:10px;
  letter-spacing:.26em;
  text-transform:uppercase;
  color:rgba(255,255,255,.35);
}
.segs{
  display:flex;
  gap:4px;
  max-width:100%;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  border-radius:999px;
  padding:4px;
}
.segs button{
  cursor:pointer;
  font-family:'Geist Mono',ui-monospace,monospace;
  font-size:11px;
  letter-spacing:.04em;
  white-space:nowrap;
  border:none;
  border-radius:999px;
  padding:8px 14px;
  background:transparent;
  color:rgba(255,255,255,.55);
  transition:background 220ms, color 220ms, transform 140ms var(--ease);
}
.segs button:hover{color:rgba(255,255,255,.85)}
.segs button[aria-pressed="true"]{
  background:rgba(255,255,255,.92);
  color:#0c0c0e;
}

.hint{
  margin-top:22px;
  font-family:'Geist Mono',ui-monospace,monospace;
  font-size:11px;
  letter-spacing:.06em;
  color:rgba(255,255,255,.3);
}

/* footer */
.footer{
  position:relative;
  flex-shrink:0;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  align-items:center;
  gap:8px;
  padding:28px 24px 32px;
  font-family:'Geist Mono',ui-monospace,monospace;
  font-size:11px;
  letter-spacing:.04em;
  color:rgba(255,255,255,.32);
  text-align:center;
}
.footer a{
  color:rgba(255,255,255,.52);
  text-decoration:none;
  border-bottom:1px solid rgba(255,255,255,.16);
  transition:color 200ms, border-color 200ms;
}
.footer a:hover{
  color:rgba(255,255,255,.85);
  border-bottom-color:rgba(255,255,255,.4);
}
.footer .dot{opacity:.5}

/* empty state */
.is-empty .pill{display:none}
.is-empty .copy{opacity:.35;pointer-events:none}
.is-empty .name{opacity:.45;font-style:italic}
.is-empty .glow{opacity:.10}
.is-empty .family{min-height:1em}

/* keyboard focus */
.copy:focus-visible,
.segs button:focus-visible,
.footer a:focus-visible{
  outline:2px solid var(--accent);
  outline-offset:2px;
}
.hexfield:focus-visible{outline:none}

@media (max-width:600px){
  .topbar{padding:24px 20px;font-size:11px}
  .stage{padding:0 16px 24px}
  .settings{gap:24px}
  .footer{gap:6px;font-size:10px;line-height:1.6}
  .footer .dot{display:none}
  .footer > span,.footer > a{flex-basis:100%}
}

@media (max-width:380px){
  .segs button{padding:8px 9px;font-size:10px;letter-spacing:0}
  .swatch{width:76px;height:76px;border-radius:18px;margin-bottom:24px}
  .hexwrap{margin-top:32px}
  .meta{margin-top:28px}
  .settings{margin-top:32px}
}

</style>
</head>
<body class="is-empty">

<div class="glow" id="glow"></div>

<header class="topbar">
  <span>Name a Color</span>
  <span>v2.1</span>
</header>

<main class="stage">

  <div class="swatch" id="swatch"></div>

  <div class="family" id="family"></div>

  <h1 class="name" id="name" aria-live="polite">name a color</h1>

  <div class="hexwrap">
    <span class="hash">#</span>
    <span id="hex" class="hexfield"
          contenteditable="plaintext-only"
          role="textbox"
          aria-label="Hex code"
          spellcheck="false"
          autocorrect="off"
          autocapitalize="off"
          data-placeholder="000000"></span>
    <button id="clear" class="clear" type="button" aria-label="Clear" title="Clear">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" aria-hidden="true">
        <line x1="6" y1="6" x2="18" y2="18"></line>
        <line x1="18" y1="6" x2="6" y2="18"></line>
      </svg>
    </button>
  </div>

  <div class="meta">
    <div class="pills">
      <span class="pill" id="rgb"></span>
      <span class="pill" id="hsl"></span>
    </div>
    <button class="copy" id="copy" type="button">Copy</button>
  </div>

  <div class="settings">
    <div class="group">
      <div class="grouplabel">Format</div>
      <div class="segs" id="fmt">
        <button data-v="title" type="button">Title Case</button>
        <button data-v="lower" type="button">lowercase</button>
        <button data-v="dash" type="button">lower-dash</button>
      </div>
    </div>
  </div>

  <div class="hint">⌘C / Ctrl+C to copy</div>

</main>

<footer class="footer">

</footer>

<script>
const el = {
  swatch: document.getElementById('swatch'),
  family: document.getElementById('family'),
  name:   document.getElementById('name'),
  hex:    document.getElementById('hex'),
  rgb:    document.getElementById('rgb'),
  hsl:    document.getElementById('hsl'),
  copy:   document.getElementById('copy'),
  clear:  document.getElementById('clear'),
  fmt:    document.getElementById('fmt'),
};

const state = {
  raw: '',
  format: 'dash',
  copied: false,
};

let copyTimer = null;
let hashTimer = null;
let lastValid = null;

/* ---------- color dataset ---------- */

let DB = null;

function loadColors(){
  const d = window.__COLORS__;
  if(!d || !d.n || !d.h) return false;

  const N = d.n.length;
  const L = new Float32Array(N), A = new Float32Array(N), B = new Float32Array(N);

  for(let i = 0; i < N; i++){
    const n = parseInt(d.h.substr(i*6, 6), 16);
    const lab = rgbToLab((n>>16)&255, (n>>8)&255, n&255);
    L[i] = lab[0]; A[i] = lab[1]; B[i] = lab[2];
  }
  DB = { n: d.n, L, A, B, N };
  return true;
}

/* ---------- color math ---------- */

function hexToRgb(h){
  const n = parseInt(h, 16);
  return { r:(n>>16)&255, g:(n>>8)&255, b:n&255 };
}

function rgbToHsl(r, g, b){
  r/=255; g/=255; b/=255;
  const mx = Math.max(r,g,b), mn = Math.min(r,g,b);
  let h = 0, s = 0;
  const l = (mx+mn)/2;
  const d = mx-mn;
  if(d !== 0){
    s = l > 0.5 ? d/(2-mx-mn) : d/(mx+mn);
    if(mx === r)      h = ((g-b)/d + (g<b ? 6 : 0));
    else if(mx === g) h = (b-r)/d + 2;
    else              h = (r-g)/d + 4;
    h *= 60;
  }
  return { h:Math.round(h), s:Math.round(s*100), l:Math.round(l*100) };
}

function srgb(c){
  c /= 255;
  return c <= 0.04045 ? c/12.92 : Math.pow((c+0.055)/1.055, 2.4);
}

function rgbToLab(r, g, b){
  r = srgb(r); g = srgb(g); b = srgb(b);
  const x = (r*0.4124 + g*0.3576 + b*0.1805) / 0.95047;
  const y =  r*0.2126 + g*0.7152 + b*0.0722;
  const z = (r*0.0193 + g*0.1192 + b*0.9505) / 1.08883;
  const f = t => t > 0.008856 ? Math.cbrt(t) : 7.787*t + 16/116;
  const fx = f(x), fy = f(y), fz = f(z);
  return [116*fy - 16, 500*(fx-fy), 200*(fy-fz)];
}

/* ---------- nearest curated name ---------- */

function nearestName(hex){
  if(!DB) return null;
  const c = hexToRgb(hex);
  const lab = rgbToLab(c.r, c.g, c.b);
  const l = lab[0], a = lab[1], bb = lab[2];
  let best = 0, bd = Infinity;
  for(let i = 0; i < DB.N; i++){
    const dl = DB.L[i]-l, da = DB.A[i]-a, db = DB.B[i]-bb;
    const dist = dl*dl + da*da + db*db;
    if(dist < bd){ bd = dist; best = i; }
  }
  return DB.n[best];
}

/* ---------- family label ---------- */

function familyOf(h, s){
  if(s <= 8) return 'Neutral';
  if(h < 15)  return 'Red';
  if(h < 42)  return 'Orange';
  if(h < 66)  return 'Yellow';
  if(h < 150) return 'Green';
  if(h < 190) return 'Teal';
  if(h < 250) return 'Blue';
  if(h < 290) return 'Violet';
  if(h < 335) return 'Magenta';
  return 'Red';
}

/* ---------- formatting ---------- */

function applyFormat(name, fmt){
  const words = name.trim().split(/\s+/);
  if(fmt === 'title') return words.join(' ');

  const lower = words.map(function(w){
    return w.toLowerCase()
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .replace(/[^a-z0-9]/g, '');
  }).filter(Boolean);

  return fmt === 'lower' ? lower.join(' ') : lower.join('-');
}

/* ---------- compute ---------- */

function normalize(raw){
  if(/^[0-9a-f]{3}$/.test(raw)) return raw.split('').map(c => c+c).join('');
  if(/^[0-9a-f]{6}$/.test(raw)) return raw;
  return null;
}

const EMPTY = {
  hexFull: null,
  r:0, g:0, b:0, h:0, s:0, l:0,
  name: '',
  family: '',
};

function compute(){
  if(state.raw === '') return EMPTY;

  const resolved = normalize(state.raw);
  const hexFull = resolved || lastValid;
  if(!hexFull) return EMPTY;
  if(resolved) lastValid = resolved;

  const c = hexToRgb(hexFull);
  const hsl = rgbToHsl(c.r, c.g, c.b);

  const raw = nearestName(hexFull);
  const name = raw ? applyFormat(raw, state.format) : '';

  return {
    hexFull,
    r: c.r, g: c.g, b: c.b,
    h: hsl.h, s: hsl.s, l: hsl.l,
    name,
    family: familyOf(hsl.h, hsl.s),
  };
}

/* ---------- render ---------- */

function syncTail(){
  el.fmt.querySelectorAll('button').forEach(function(b){
    b.setAttribute('aria-pressed', b.dataset.v === state.format);
  });

  clearTimeout(hashTimer);
  hashTimer = setTimeout(function(){
    const valid = normalize(state.raw);
    try {
      history.replaceState(null, '', valid ? '#' + state.raw : location.pathname);
    } catch(_){}
  }, 250);
}

function render(){
  const v = compute();
  const empty = v.hexFull === null;

  document.body.classList.toggle('is-empty', empty);

  if(empty){
    document.documentElement.style.setProperty('--bg', '#2a2a2e');
    document.documentElement.style.setProperty('--accent', 'rgba(255,255,255,0.30)');
    el.family.textContent = '';
    el.name.textContent   = 'name a color';
    el.rgb.textContent    = '';
    el.hsl.textContent    = '';
    el.copy.textContent   = 'Copy';
    document.title = 'Name a Color';
    syncTail();
    return;
  }

  const aL = Math.min(78, Math.max(v.l, 62));
  const aS = v.s < 12 ? 0 : Math.max(v.s, 45);

  document.documentElement.style.setProperty('--bg', '#' + v.hexFull);
  document.documentElement.style.setProperty('--accent', 'hsl(' + v.h + ' ' + aS + '% ' + aL + '%)');

  el.family.textContent = v.family + ' \u00b7 ' + v.l + '% light';
  el.name.textContent   = v.name;
  el.rgb.textContent    = 'RGB ' + v.r + ' ' + v.g + ' ' + v.b;
  el.hsl.textContent    = 'HSL ' + v.h + ' ' + v.s + ' ' + v.l;
  el.copy.textContent   = state.copied ? 'Copied \u2713' : 'Copy';

  document.title = (DB ? v.name + ' \u2014 ' : '') + 'Name a Color';

  syncTail();
}

/* A contenteditable span is used instead of <input> because password
   managers (notably iCloud Passwords) offer to fill any focused text
   input and provide no developer opt-out. */

function fieldValue(){
  return el.hex.textContent;
}

function setFieldValue(v){
  if(el.hex.textContent !== v) el.hex.textContent = v;
}

function caretToEnd(){
  const r = document.createRange();
  r.selectNodeContents(el.hex);
  r.collapse(false);
  const s = window.getSelection();
  s.removeAllRanges();
  s.addRange(r);
}

function focusField(){
  el.hex.focus({ preventScroll: true });
  caretToEnd();
}

/* ---------- clipboard ---------- */

function legacyCopy(text){
  const wasInField = document.activeElement === el.hex;

  const ta = document.createElement('textarea');
  ta.value = text;
  ta.setAttribute('readonly','');
  ta.style.cssText = 'position:fixed;top:-9999px;opacity:0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); } catch(_){}
  document.body.removeChild(ta);

  if(wasInField) focusField();
}

function writeClipboard(text){
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(text).catch(function(){ legacyCopy(text); });
  } else {
    legacyCopy(text);
  }
}

function doCopy(){
  if(!DB) return;
  const v = compute();
  if(!v.hexFull || !v.name) return;
  writeClipboard(v.name);
  state.copied = true;
  render();
  clearTimeout(copyTimer);
  copyTimer = setTimeout(function(){ state.copied = false; render(); }, 1600);
}

/* ---------- events ---------- */

el.hex.addEventListener('input', function(){
  const clean = fieldValue().replace(/[^0-9a-fA-F]/g,'').toLowerCase().slice(0,6);
  if(clean !== fieldValue()){
    setFieldValue(clean);
    caretToEnd();
  }
  state.raw = clean;
  state.copied = false;
  render();
});

// block newlines and paste formatting
el.hex.addEventListener('paste', function(e){
  e.preventDefault();
  const text = (e.clipboardData || window.clipboardData).getData('text') || '';
  const clean = (fieldValue() + text).replace(/[^0-9a-fA-F]/g,'').toLowerCase().slice(0,6);
  setFieldValue(clean);
  caretToEnd();
  state.raw = clean;
  state.copied = false;
  render();
});

/* Buttons act on pointerdown for instant response on touch.
   `click` still fires for keyboard (Enter/Space), so we guard against
   running the action twice for the same interaction. */
function fastButton(node, run){
  let handled = false;

  node.addEventListener('pointerdown', function(e){
    if(e.button && e.button !== 0) return;   // ignore right/middle click
    e.preventDefault();                       // keeps focus in the hex field
    handled = true;
    run(e);
  });

  node.addEventListener('click', function(e){
    if(handled){ handled = false; return; }   // pointer already ran it
    run(e);                                   // keyboard activation
  });
}

fastButton(el.fmt, function(e){
  const b = e.target.closest('button');
  if(!b) return;
  state.format = b.dataset.v;
  state.copied = false;
  render();
});

fastButton(el.copy, doCopy);
fastButton(el.clear, clearAll);

// Esc on the input itself — some browsers (Arc) intercept Escape at the
// window level, so this local listener catches it when the field is focused.
el.hex.addEventListener('keydown', function(e){
  if(e.key === 'Enter'){
    e.preventDefault();
    return;
  }
  if(e.key === 'Escape'){
    e.preventDefault();
    e.stopPropagation();
    clearAll();
  }
});

function clearAll(){
  if(state.raw === '') return;
  state.raw = '';
  lastValid = null;
  state.copied = false;
  setFieldValue('');
  render();
  focusField();
}

window.addEventListener('keydown', function(e){
  if(e.key === 'Escape'){
    e.preventDefault();
    clearAll();
    return;
  }

  if((e.metaKey || e.ctrlKey) && (e.key || '').toLowerCase() === 'c'){
    // if the user has selected text anywhere, let the browser copy it
    const sel = (window.getSelection && window.getSelection().toString()) || '';
    if(sel.trim() !== '') return;
    e.preventDefault();
    doCopy();
  }
});

/* ---------- init ---------- */

const fromHash = location.hash.replace('#','').toLowerCase();
if(/^([0-9a-f]{3}|[0-9a-f]{6})$/.test(fromHash)) state.raw = fromHash;
setFieldValue(state.raw);

if(!loadColors()){
  render();
  el.name.textContent = 'offline';
} else {
  render();
}

// Focus on desktop only — auto-opening the keyboard on mobile is jarring.
const isDesktop = window.matchMedia &&
  window.matchMedia('(hover: hover) and (pointer: fine)').matches;
if(isDesktop) focusField();

</script>
</body>
</html>
